name: CCUsageBar
options:
  bundleIdPrefix: com.konradmichalik
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.35.0"

targets:
  CCUsageBar:
    type: application
    platform: macOS
    sources:
      - CCUsageBar/Sources
    resources:
      - CCUsageBar/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konradmichalik.cc-usage-bar
        PRODUCT_NAME: CC Usage Bar
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: CCUsageBar/Info.plist
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: CCUsageBar/CCUsageBar.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        ENABLE_APP_SANDBOX: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
