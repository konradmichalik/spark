name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -scheme Spark \
            -configuration Release \
            -derivedDataPath build \
            -arch ${{ matrix.arch }} \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Spark.app"
          DMG_NAME="Spark-${{ matrix.target }}.dmg"

          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create \
            -volname "Spark" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: "*.dmg"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          cd dmg-arm64 && shasum -a 256 *.dmg > ../checksums.txt && cd ..
          cd dmg-x86_64 && shasum -a 256 *.dmg >> ../checksums.txt && cd ..
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dmg-arm64/*.dmg
            dmg-x86_64/*.dmg
            checksums.txt

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract checksums
        id: checksums
        run: |
          ARM64_SHA=$(grep "aarch64" checksums.txt | awk '{print $1}')
          X86_SHA=$(grep "x86_64" checksums.txt | awk '{print $1}')
          echo "arm64_sha=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "x86_sha=$X86_SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: konradmichalik/homebrew-tap
          event-type: update-cask
          client-payload: |
            {
              "app": "spark",
              "version": "${{ steps.version.outputs.version }}",
              "tag": "${{ steps.version.outputs.tag }}",
              "sha_arm": "${{ steps.checksums.outputs.arm64_sha }}",
              "sha_intel": "${{ steps.checksums.outputs.x86_sha }}"
            }
